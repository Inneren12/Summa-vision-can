services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Bind to loopback only. Reverse proxy (Caddy on VPS, dev tools on
    # localhost) connects via 127.0.0.1:8000. Base 0.0.0.0 binding would
    # bypass UFW via Docker's iptables DOCKER chain. Operators needing
    # cross-host dev exposure use docker-compose.override.yml.example
    # as a template. See DEBT-046 in DEBT.md.
    ports:
      - "127.0.0.1:8000:8000"
    # NOTE: api.environment is an explicit whitelist — only the vars listed
    # below reach the container. Vars present in .env files but not enumerated
    # here are silently dropped. When backend Settings gains a new field that
    # must be runtime-configurable, add it here deliberately.
    environment:
      # Application mode
      # Backend Settings reads ENVIRONMENT; .env files use APP_ENV by convention.
      # Do not rename without also updating either side.
      ENVIRONMENT: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      # Database
      DATABASE_URL: ${DATABASE_URL}
      # Auth
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      # Storage
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      # CDN
      CDN_BASE_URL: ${CDN_BASE_URL:?CDN_BASE_URL is required (e.g. https://cdn.summa.vision)}
      # Public site (required-in-prod, validated by Settings)
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 35s  # R20: 30s shutdown wait + 5s margin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: summa-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
