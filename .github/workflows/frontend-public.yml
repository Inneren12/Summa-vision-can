name: Frontend Public CI

on:
  push:
    paths:
      - "frontend-public/**"
  pull_request:
    paths:
      - "frontend-public/**"

permissions:
  contents: read

jobs:
  test:
    name: Node.js Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-public/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
