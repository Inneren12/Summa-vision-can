name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "DEBT.md"
      - "verify_debt.py"
  pull_request:
    paths:
      - "backend/**"
      - "DEBT.md"
      - "verify_debt.py"

permissions:
  contents: read

jobs:
  test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      ADMIN_API_KEY: test-ci-key
      STORAGE_BACKEND: local
      LOG_FORMAT: console

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Alembic has one head
        run: |
          HEADS=$(alembic heads 2>&1 | grep -c "head")
          echo "Alembic heads: $HEADS"
          if [ "$HEADS" -ne 1 ]; then
            echo "ERROR: Expected 1 Alembic head, found $HEADS"
            alembic heads
            exit 1
          fi

      - name: Apply migrations
        run: alembic upgrade head

      - name: Verify migration reversibility
        run: |
          alembic downgrade -1
          alembic upgrade head

      - name: Run unit tests with coverage
        run: |
          pytest -m "not integration" --cov=src --cov-report=term-missing --cov-fail-under=85 --tb=short -q

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest -m integration --tb=short -q || true

      - name: Validate DEBT.md
        working-directory: .
        run: python verify_debt.py

      - name: Type check
        run: mypy src/ --no-error-summary || true

      - name: Format check
        run: black --check src/ tests/ || true
