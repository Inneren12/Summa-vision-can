name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "DEBT.md"
      - "verify_debt.py"
  pull_request:
    paths:
      - "backend/**"
      - "DEBT.md"
      - "verify_debt.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      ADMIN_API_KEY: test-ci-key
      STORAGE_BACKEND: local
      LOG_FORMAT: console

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Alembic has one head
        run: |
          HEAD_COUNT=$(alembic heads 2>/dev/null | grep -cE '^[a-f0-9]{12}')
          echo "Alembic head count: $HEAD_COUNT"
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "ERROR: Expected exactly 1 Alembic head, found $HEAD_COUNT"
            echo "--- Full output ---"
            alembic heads
            exit 1
          fi
          echo "✓ Alembic: single head"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Verify migration reversibility
        run: |
          alembic downgrade -1
          alembic upgrade head

      - name: Run unit tests with coverage
        run: |
          pytest -m "not integration" --cov=src --cov-report=term-missing --cov-fail-under=85 --tb=short -q

      - name: Validate DEBT.md
        working-directory: .
        run: python verify_debt.py

      - name: Type check
        run: mypy src/ --no-error-summary || true

      - name: Format check
        run: black --check src/ tests/ || true

  integration:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_integration
      TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_integration
      ADMIN_API_KEY: test-ci-key
      STORAGE_BACKEND: local
      LOG_FORMAT: console

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run integration tests
        working-directory: backend
        run: pytest -m integration --tb=short -v
