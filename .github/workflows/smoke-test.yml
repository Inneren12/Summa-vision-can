name: Smoke Test (Docker)

on:
  schedule:
    # Nightly at 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Manual trigger for pre-release verification
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'pre-release check'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for dev compose
        run: |
          cat > backend/.env << 'EOF'
          DATABASE_URL=postgresql+asyncpg://summa:devpassword@db:5432/summa
          ADMIN_API_KEY=smoke-test-key
          STORAGE_BACKEND=s3
          S3_BUCKET=summa-vision-dev
          S3_ENDPOINT_URL=http://minio:9000
          S3_ACCESS_KEY_ID=minioadmin
          S3_SECRET_ACCESS_KEY=minioadmin
          S3_REGION=us-east-1
          CDN_BASE_URL=http://localhost:9000/summa-vision-dev
          LOG_FORMAT=json
          BACKUP_S3_BUCKET=summa-vision-dev
          BACKUP_RETENTION_DAYS=30
          EOF

      # ---------------------------------------------------------------
      # BUILD & START
      # ---------------------------------------------------------------
      - name: Build and start stack
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "ERROR: API not healthy after 30s"
              docker compose -f docker-compose.dev.yml logs api
              exit 1
            fi
            sleep 1
          done

      # ---------------------------------------------------------------
      # HEALTH CHECKS
      # ---------------------------------------------------------------
      - name: "Check: Liveness endpoint"
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/api/health)
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f'Expected ok, got {data}'
          print('✓ Liveness: ok')
          "

      - name: "Check: Readiness endpoint"
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/api/health/ready)
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['status'] == 'ready', f'Expected ready, got {data}'
          assert data['checks']['database'] == 'ok', 'DB check failed'
          print('✓ Readiness: ok (DB + temp dir)')
          "

      # ---------------------------------------------------------------
      # AUTH
      # ---------------------------------------------------------------
      - name: "Check: Admin auth rejects without key"
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            http://localhost:8000/api/v1/admin/queue 2>/dev/null || true)
          echo "Status without key: $STATUS"
          # Accept 401 or 403
          if [ "$STATUS" != "401" ] && [ "$STATUS" != "403" ]; then
            echo "ERROR: Expected 401/403, got $STATUS"
            exit 1
          fi
          echo "✓ Auth: rejects unauthenticated requests"

      - name: "Check: Admin auth accepts with key"
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "X-API-KEY: smoke-test-key" \
            http://localhost:8000/api/v1/admin/queue 2>/dev/null || true)
          echo "Status with key: $STATUS"
          # Accept 200 or 404 (route may not exist yet), but NOT 401
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "ERROR: Auth rejected valid key"
            exit 1
          fi
          echo "✓ Auth: accepts valid API key"

      # ---------------------------------------------------------------
      # ALEMBIC
      # ---------------------------------------------------------------
      - name: "Check: Alembic has one head"
        run: |
          HEADS=$(docker compose -f docker-compose.dev.yml exec -T api \
            alembic heads 2>&1 | grep -cE '^[a-f0-9]{12}' || echo "0")
          echo "Alembic heads: $HEADS"
          if [ "$HEADS" != "1" ]; then
            echo "ERROR: Expected 1 head"
            docker compose -f docker-compose.dev.yml exec -T api alembic heads
            exit 1
          fi
          echo "✓ Alembic: single head"

      # ---------------------------------------------------------------
      # JOB SYSTEM
      # ---------------------------------------------------------------
      - name: "Check: Job enqueue + audit event"
        run: |
          docker compose -f docker-compose.dev.yml exec -T api python3 -c "
          import asyncio
          from sqlalchemy import select, func

          async def test():
              from src.core.database import async_session_factory
              from src.repositories.job_repository import JobRepository
              from src.schemas.job_payloads import CatalogSyncPayload
              from src.models.audit_event import AuditEvent

              async with async_session_factory() as session:
                  # Enqueue a test job
                  repo = JobRepository(session)
                  job = await repo.enqueue(
                      'catalog_sync',
                      CatalogSyncPayload().model_dump_json(),
                      dedupe_key='ci_smoke_test',
                      created_by='ci:smoke',
                  )
                  await session.commit()

                  assert job.id is not None, 'Job not created'
                  assert job.status.value == 'queued', f'Expected queued, got {job.status}'
                  print(f'✓ Job enqueued: id={job.id}')

                  # Verify audit event
                  count = await session.scalar(
                      select(func.count(AuditEvent.id)).where(
                          AuditEvent.event_type == 'job.created',
                          AuditEvent.entity_id == str(job.id),
                      )
                  )
                  assert count >= 1, 'job.created audit event missing'
                  print(f'✓ Audit: job.created event exists')

          asyncio.run(test())
          "

      # ---------------------------------------------------------------
      # RUNNER
      # ---------------------------------------------------------------
      - name: "Check: Job runner is active"
        run: |
          docker compose -f docker-compose.dev.yml logs api 2>&1 | \
            grep -q "job_runner_started" && \
            echo "✓ Runner: started" || \
            echo "⚠ Runner: start log not found (may have scrolled)"

      # ---------------------------------------------------------------
      # BACKUP TOOLS
      # ---------------------------------------------------------------
      - name: "Check: Backup tools available"
        run: |
          docker compose -f docker-compose.dev.yml exec -T api \
            bash -c "which pg_dump && which aws" && \
            echo "✓ Backup tools: pg_dump + aws available" || \
            echo "⚠ Backup tools: missing (check Dockerfile)"

      # ---------------------------------------------------------------
      # MINIO
      # ---------------------------------------------------------------
      - name: "Check: MinIO bucket exists"
        run: |
          docker compose -f docker-compose.dev.yml logs minio-init 2>&1 | \
            grep -qi "ready\|already\|exists" && \
            echo "✓ MinIO: bucket ready" || \
            echo "⚠ MinIO: bucket status unclear"

      # ---------------------------------------------------------------
      # TESTS INSIDE CONTAINER
      # ---------------------------------------------------------------
      - name: "Run: Unit tests in container"
        run: |
          docker compose -f docker-compose.dev.yml exec -T api \
            pytest tests/ -m "not integration" --tb=short -q 2>&1 | tail -10

      # ---------------------------------------------------------------
      # GRACEFUL SHUTDOWN
      # ---------------------------------------------------------------
      - name: "Check: Graceful shutdown"
        run: |
          docker compose -f docker-compose.dev.yml stop api
          sleep 2
          SHUTDOWN_LOG=$(docker compose -f docker-compose.dev.yml logs api 2>&1 | tail -15)
          echo "$SHUTDOWN_LOG"
          echo "$SHUTDOWN_LOG" | grep -q "shutdown_initiated\|app_stopped\|runner_stopped" && \
            echo "✓ Shutdown: graceful" || \
            echo "⚠ Shutdown: graceful signal not found in logs"

      # ---------------------------------------------------------------
      # CLEANUP
      # ---------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v --remove-orphans

      # ---------------------------------------------------------------
      # SUMMARY
      # ---------------------------------------------------------------
      - name: Summary
        if: always()
        run: echo "Smoke test complete. Check step results above."
